; Recommended: true for production, false for debugging only
enable_signing = true
; Node reputation threshold (0-100, nodes below this are banned)
reputation_threshold = 50

[logging]
; Log level (debug, info, warning, error)
log_level = info
; Log to file (true/false)
log_to_file = true
log_file_path = logs/freeai.log
