; ========================================
[network]
; Bootstrap port for P2P discovery (change if 9090 is blocked)
bootstrap_port = 9092
; Users can add their own public nodes here to decentralize further
seed_nodes = 127.0.0.1:9090,127.0.0.1:9091

[inference]
; Path to the quantized model file (GGUF format)
model_path = models/qwen2.5-3b-instruct.Q2_K.gguf
; Context window size (lower for low-RAM nodes, higher for better comprehension)
context_size = 2048
; Number of CPU threads for inference
threads = 4
; KV Cache quantization (q8_0, q4_0, or f16)
cache_type_k = q8_0
cache_type_v = q8_0

[security]
; Do not share your private_key_pem with anyone
