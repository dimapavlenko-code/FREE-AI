; ========================================
[network]
; Bootstrap port for P2P discovery (change if 9090 is blocked)
bootstrap_port = 9090
; Users can add their own public nodes here to decentralize further
seed_nodes = 127.0.0.1:9091,127.0.0.1:9092

[inference]
# Model file path
model_path = D:\Git\Stuff\FreeAI\FREE-AI\models\qwen2.5-0.5b-instruct-q8_0.gguf

# Context size (tokens)
n_ctx = 2048

# CPU threads for inference
n_threads = 4

# Batch size for prompt processing
n_batch = 512

# GPU offloading: 0 = disabled, -1 = all layers, 1-99 = specific layers
n_gpu_layers = 0

# Enable GPU offloading (true/false)
use_gpu = false

# Memory allocation (percentages, must sum to 100)
identity_ratio = 25
session_ratio = 25
conversation_ratio = 50

# Archive settings
max_archive_files = 100
archive_path = models/archive

# Thresholds (percentages)
compression_threshold = 75
archive_warning_threshold = 80

# Max tokens to generate per inference
n_predict = 256

# Sampling temperature (0.0 = deterministic, 1.0 = creative)
temperature = 0.7

