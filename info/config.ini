; ========================================
; FREE-AI Configuration
; Ethical Basis: Decentralized P2P Inference - No Single Owner
; ========================================

[network]
; Bootstrap port for P2P discovery (change if 9090 is blocked)
bootstrap_port = 9090

; Comma-separated list of seed nodes (IP:Port)
; Users can add their own public nodes here to decentralize further
seed_nodes = seed1.freeai.network:9090,seed2.freeai.network:9090

[inference]
; Path to the quantized model file (GGUF format)
model_path = models/qwen2.5-3b-instruct.Q2_K.gguf

; Context window size (lower for low-RAM nodes, higher for better comprehension)
context_size = 2048

; Number of CPU threads for inference
threads = 4

; KV Cache quantization (q8_0, q4_0, or f16)
cache_type_k = q8_0
cache_type_v = q8_0

[security]
; PEM-formatted Ed25519 keys (auto-generated on first run)
; Do not share your private_key_pem with anyone
public_key_pem = -----BEGIN PUBLIC KEY-----
MCowBQYDK2VuAyEAedqB/OV4g3Is/RZY+Hsl1lyOySjKXL9fK09325yEdQg=
-----END PUBLIC KEY-----

private_key_pem = -----BEGIN PRIVATE KEY-----
MC4CAQAwBQYDK2VuBCIEIPhL/eT4yIlaTBkFE2GEQZouwAxnUvSmTcv0EP+EcSZ8
-----END PRIVATE KEY-----

; Enable cryptographic packet signing (true/false)
; Recommended: true for production, false for debugging only
enable_signing = true

; Node reputation threshold (0-100, nodes below this are banned)
reputation_threshold = 50

[logging]
; Log level (debug, info, warning, error)
log_level = info

; Log to file (true/false)
log_to_file = true
log_file_path = logs/freeai.log